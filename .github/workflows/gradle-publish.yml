name: Publish to GitHub Packages

on:
    push:
        branches:
            - main

jobs:
    platform_matrix:
        strategy:
            max-parallel: 1
            matrix:
                system_image:
                    - ubuntu-24.04
                    - windows-2022
                    - macos-14-xlarge
                include:
                    - system_image: macos-14-xlarge
                      system_architecture: aarch64
                    - system_image: ubuntu-24.04
                      system_architecture: x64
                    - system_image: windows-2022
                      system_architecture: x64
                      
        runs-on: ${{ matrix.system_image }}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup JDK
              uses: actions/setup-java@4.7.0
              with:
                  distribution: oracle
                  java-version: "21"
                  architecture: ${{ matrix.system_architecture }}

            - name: Grant execute permission for Gradle
              run: chmod +x gradlew

            - name: Publish Package
              run: ./gradlew publishTargetJvmPlatformPublicationToGithubRepository -PtargetJvmPlatform=macos
              env:
                  GITHUB_ACTOR: ${{ github.actor }}
                  GITHUB_TOKEN: ${{ secrets.PUBLISHING_TOKEN }}
                  